<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DXD Explorer</title>
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <header>
    <h1>DXD Explorer</h1>
    <p class="subtitle">Point Browser</p>
  </header>

  <main>
    <div id="loading" class="loading">Loading points...</div>
    <div id="error" class="error" style="display:none"></div>
    <table id="points-table" style="display:none">
      <thead>
        <tr>
          <th>Point Name</th>
          <th>Value</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </main>

  <footer>
    <p>DXD Explorer v1.0</p>
  </footer>

  <script src="js/config.js"></script>
  <script src="js/discovery.js"></script>
  <script src="js/subscription.js"></script>
  <script>
    bajaRequire(['baja!', 'jquery'], function(baja, $) {
      'use strict';
      var script = document.createElement('script');
      script.src = 'js/app.js';
      script.onload = function() {
        if (typeof DxdApp !== 'undefined' && DxdApp.init) {
          DxdApp.init(baja, $);
        }
      };
      document.head.appendChild(script);
    });
  </script>
</body>
</html>
