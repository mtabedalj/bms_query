<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DXD Explorer</title>
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <header>
    <h1>DXD Explorer</h1>
    <p class="subtitle">Point Browser</p>
  </header>

  <main>
    <div id="loading" class="loading">Loading points...</div>
    <div id="error" class="error" style="display:none"></div>
    <table id="points-table" style="display:none">
      <thead>
        <tr>
          <th class="th-status">Status</th>
          <th>Point Name</th>
          <th>Value</th>
          <th>Units</th>
          <th class="th-actions">Actions</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </main>

  <footer>
    <p>DXD Explorer v1.0</p>
  </footer>

  <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
  <script src="js/config.js"></script>
  <script src="js/discovery.js"></script>
  <script src="js/subscription.js"></script>
  <script src="js/history.js"></script>
  <script src="js/modal.js"></script>
  <script src="js/bootstrap.js"></script>
  <script>
    'use strict';

    var initCallback = function(baja, $) {
      google.charts.load('current', { packages: ['corechart'] });
      var script = document.createElement('script');
      script.src = 'js/app.js';
      script.onload = function() {
        if (typeof DxdApp !== 'undefined' && DxdApp.init) {
          DxdApp.init(baja, $);
        }
      };
      document.head.appendChild(script);
    };

    if (typeof bajaRequire !== 'undefined') {
      BajaBootstrap.start(bajaRequire, initCallback);
    } else {
      var shimScript = document.createElement('script');
      shimScript.src = 'js/shims.js';
      shimScript.onload = function() {
        BajaBootstrap.start(bajaRequire, initCallback);
      };
      document.head.appendChild(shimScript);
    }
  </script>
</body>
</html>
